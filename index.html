<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMDB Movie Explorer</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent-color: #00d1b2;
            --text-primary: #e5e5e5;
            --text-secondary: #999;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        /* Navbar & Search Box */
        .navbar {
            background-color: rgba(15, 15, 15, 0.95) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #333;
            padding: 1rem 0;
        }

        .search-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input {
            width: 40px;
            height: 40px;
            background: transparent;
            border: 1px solid var(--accent-color);
            border-radius: 20px;
            color: white;
            padding: 0 15px 0 40px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            outline: none;
        }

        .search-input:focus, .search-input:not(:placeholder-shown) {
            width: 250px;
            cursor: text;
            background: rgba(255, 255, 255, 0.05);
        }

        .search-icon {
            position: absolute;
            left: 12px;
            color: var(--accent-color);
            pointer-events: none;
            font-size: 1.2rem;
        }

        /* Movie Cards */
        .movie-card {
            background-color: var(--card-bg);
            border: none;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            height: 100%;
        }

        .movie-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.8);
        }

        .poster-container {
            position: relative;
            overflow: hidden;
            aspect-ratio: 2/3;
        }

        .movie-poster {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: scale 0.5s ease;
        }

        .movie-card:hover .movie-poster {
            scale: 1.1;
        }

        .rating-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: var(--accent-color);
            padding: 5px 10px;
            border-radius: 8px;
            font-weight: 700;
            backdrop-filter: blur(5px);
            border: 1px solid var(--accent-color);
        }

        .card-body {
            padding: 1.25rem;
        }

        .movie-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: white;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .movie-overview {
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.5;
        }

        /* Pagination */
        .pagination .page-link {
            background-color: var(--card-bg);
            border: 1px solid #333;
            color: var(--text-primary);
            margin: 0 5px;
            border-radius: 8px;
            padding: 8px 16px;
        }

        .pagination .page-item.active .page-link {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: #000;
            font-weight: 700;
        }

        .pagination .page-link:hover:not(.active) {
            background-color: #333;
            color: var(--accent-color);
        }

        /* Loading Spinner */
        #loader {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
        }

        .spinner-border {
            width: 3rem;
            height: 3rem;
            color: var(--accent-color);
        }

        /* Empty state */
        .no-results {
            text-align: center;
            padding: 50px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand d-flex align-items-center" href="#" onclick="resetHome()">
                <i class="bi bi-film me-2 text-info" style="font-size: 1.5rem;"></i>
                <span class="fw-bold text-white letter-spacing-1">CINE<span style="color: var(--accent-color);">HUB</span></span>
            </a>

            <div class="search-container">
                <i class="bi bi-search search-icon"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="Buscar películas..." autocomplete="off">
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container py-5">
        <h2 id="pageTitle" class="mb-4 fw-bold">Películas Populares</h2>
        
        <div id="movieGrid" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
            <!-- Movie cards will be injected here -->
        </div>

        <!-- Pagination -->
        <nav aria-label="Page navigation" class="mt-5">
            <ul id="pagination" class="pagination justify-content-center">
                <!-- Pagination buttons will be injected here -->
            </ul>
        </nav>
    </main>

    <!-- Loader -->
    <div id="loader">
        <div class="spinner-border" role="status">
            <span class="visually-hidden">Cargando...</span>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        // CONFIGURACIÓN (REPLACE DURING DEPLOYMENT)
        const API_KEY = "1ff27eed1fed8c31ffd5dec554d83bd8";
        const BASE_URL = "https://api.themoviedb.org/3";
        const IMG_URL = "https://image.tmdb.org/t/p/w500";
        const ITEMS_PER_PAGE = 12;

        let currentPage = 1;
        let currentQuery = "";
        let totalResults = 0;
        let allMoviesBuffer = []; // We buffer 20 results from TMDB and slice to 12

        const movieGrid = document.getElementById("movieGrid");
        const pagination = document.getElementById("pagination");
        const searchInput = document.getElementById("searchInput");
        const loader = document.getElementById("loader");
        const pageTitle = document.getElementById("pageTitle");

        // Debounce search
        let timeout = null;
        searchInput.addEventListener("input", (e) => {
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                currentQuery = e.target.value.trim();
                currentPage = 1;
                initFetch();
            }, 600);
        });

        async function initFetch() {
            showLoader(true);
            movieGrid.innerHTML = "";
            
            try {
                // To show 12 items per page when TMDB gives 20, we need to handle virtual pagination
                // Page 1 (Local) -> Index 0-11 (API Page 1)
                // Page 2 (Local) -> Index 12-19 (API Page 1) + Index 0-3 (API Page 2)
                // ... This is mathematically derived from (currentPage - 1) * ITEMS_PER_PAGE
                
                const startIdx = (currentPage - 1) * ITEMS_PER_PAGE;
                const endIdx = startIdx + ITEMS_PER_PAGE;
                
                // Which API pages do we need?
                const apiPageStart = Math.floor(startIdx / 20) + 1;
                const apiPageEnd = Math.floor((endIdx - 1) / 20) + 1;
                
                let combinedResults = [];
                
                // Fetch first API page
                const data1 = await fetchData(apiPageStart);
                combinedResults = [...data1.results];
                totalResults = data1.total_results;
                
                // Fetch second API page if needed
                if (apiPageStart !== apiPageEnd && apiPageEnd <= data1.total_pages) {
                    const data2 = await fetchData(apiPageEnd);
                    combinedResults = [...combinedResults, ...data2.results];
                }

                // Slice the buffer to get exactly 12 items
                const localStartIdx = startIdx % 20;
                const moviesToShow = combinedResults.slice(localStartIdx, localStartIdx + ITEMS_PER_PAGE);

                if (moviesToShow.length === 0) {
                    movieGrid.innerHTML = '<div class="no-results"><h3>No se encontraron películas.</h3><p>Intenta con otros términos.</p></div>';
                    pagination.innerHTML = "";
                } else {
                    renderMovies(moviesToShow);
                    renderPagination(Math.ceil(totalResults / ITEMS_PER_PAGE));
                }

                pageTitle.innerText = currentQuery ? `Resultados para "${currentQuery}"` : "Películas Populares";

            } catch (error) {
                console.error("Error fetching movies:", error);
                movieGrid.innerHTML = '<div class="alert alert-danger w-100">Error al conectar con TMDB. Verifica tu API Key.</div>';
            } finally {
                showLoader(false);
            }
        }

        async function fetchData(apiPage) {
            const endpoint = currentQuery 
                ? `${BASE_URL}/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(currentQuery)}&page=${apiPage}&language=es-ES`
                : `${BASE_URL}/movie/popular?api_key=${API_KEY}&page=${apiPage}&language=es-ES`;
            
            const response = await fetch(endpoint);
            if (!response.ok) throw new Error("API request failed");
            return await response.json();
        }

        function renderMovies(movies) {
            movieGrid.innerHTML = movies.map(movie => `
                <div class="col">
                    <div class="movie-card">
                        <div class="poster-container">
                            <img src="${movie.poster_path ? IMG_URL + movie.poster_path : 'https://placehold.co/500x750?text=No+Poster'}" 
                                 class="movie-poster" 
                                 alt="${movie.title}">
                            <div class="rating-badge">
                                <i class="bi bi-star-fill me-1"></i>${movie.vote_average.toFixed(1)}
                            </div>
                        </div>
                        <div class="card-body">
                            <h5 class="movie-title">${movie.title}</h5>
                            <p class="movie-overview">${movie.overview || "Sin sinopsis disponible."}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderPagination(totalPages) {
            // TMDB limits to 500 pages usually, or total_pages
            const maxPages = Math.min(totalPages, 500); 
            let html = '';
            
            // Previous button
            html += `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                <button class="page-link" onclick="changePage(${currentPage - 1})"><i class="bi bi-chevron-left"></i></button>
            </li>`;

            // Page numbers (sliding window)
            let start = Math.max(1, currentPage - 2);
            let end = Math.min(maxPages, start + 4);
            if (end - start < 4) start = Math.max(1, end - 4);

            for (let i = start; i <= end; i++) {
                html += `<li class="page-item ${i === currentPage ? 'active' : ''}">
                    <button class="page-link" onclick="changePage(${i})">${i}</button>
                </li>`;
            }

            // Next button
            html += `<li class="page-item ${currentPage === maxPages ? 'disabled' : ''}">
                <button class="page-link" onclick="changePage(${currentPage + 1})"><i class="bi bi-chevron-right"></i></button>
            </li>`;

            pagination.innerHTML = html;
        }

        function changePage(page) {
            currentPage = page;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            initFetch();
        }

        function resetHome() {
            searchInput.value = "";
            currentQuery = "";
            currentPage = 1;
            initFetch();
        }

        function showLoader(show) {
            loader.style.display = show ? "block" : "none";
            movieGrid.style.opacity = show ? "0.3" : "1";
        }

        // Initialize
        initFetch();
    </script>
</body>
</html>
